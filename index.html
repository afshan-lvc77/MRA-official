<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRA Official Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; background: linear-gradient(45deg, #24b47e, #1a8a5f); border-radius: 15px; margin-bottom: 30px; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .app-card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); border-color: #24b47e; }
        .app-name { font-size: 1.4rem; font-weight: bold; color: #24b47e; margin-bottom: 10px; }
        .app-desc { font-size: 0.9rem; color: #bbb; margin-bottom: 20px; height: 40px; overflow: hidden; }
        .btn-download { display: block; text-align: center; background: #24b47e; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MRA Official Store</h1>
        <p>Download my latest Android Projects</p>
    </div>

    <div class="app-grid" id="appGrid">
        </div>

    <script>
        // --- APNI DETAILS YAHA DALO ---
        const SUPABASE_URL = 'https://eteahrnwvtddxqopspuc.supabase.co'; 
        const SUPABASE_KEY = 'YAHA_APNI_ANON_KEY_DALO';
        // ------------------------------

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadApps() {
            const { data: apps, error } = await _supabase
                .from('my_apps')
                .select('*')
                .order('id', { ascending: false });

            if (error) return console.log("Error loading apps:", error);

            const grid = document.getElementById('appGrid');
            grid.innerHTML = apps.map(app => `
                <div class="app-card">
                    <div class="app-name">${app.name}</div>
                    <div class="app-desc">${app.description || 'No description available'}</div>
                    <a href="${app.download_url}" class="btn-download" target="_blank">Download APK</a>
                </div>
            `).join('');
        }

        loadApps();
    </script>
</body>
</html>
