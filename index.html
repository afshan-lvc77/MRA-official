<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidnux - Home</title>
    <style>
        /* CSS: Tumhare XML ka Web Version */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #FFFFFF; color: #000000; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; height: 60px; padding: 0 15px; border-bottom: 1px solid #eeeeee; }
        .header h1 { font-size: 20px; font-weight: bold; margin: 0; }
        .menu-btn { cursor: pointer; padding: 10px; background: none; border: none; }
        .menu-btn svg { width: 24px; height: 24px; fill: #000000; }

        /* Main Content */
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* Input Box with Paste/Clear Button */
        .input-wrapper { display: flex; align-items: center; border: 1px solid #cccccc; border-radius: 8px; height: 55px; padding: 3px; position: relative; background: #f9f9f9; }
        .input-wrapper input { flex: 1; height: 100%; border: none; background: transparent; padding: 0 15px; font-size: 16px; outline: none; }
        .action-btn { width: 48px; height: 48px; background: none; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .action-btn svg { width: 24px; height: 24px; fill: #555; }

        /* Download Button */
        .download-btn { width: 100%; height: 60px; margin-top: 20px; background-color: #3B82F6; color: #FFFFFF; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; }
        .download-btn:hover { background-color: #2563EB; }
        .download-btn:disabled { background-color: #9CA3AF; cursor: not-allowed; }

        /* Social Grid */
        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; justify-items: center; }
        .social-item { width: 65px; height: 65px; cursor: pointer; transition: transform 0.2s; }
        .social-item:hover { transform: scale(1.1); }
        .social-item img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }

        /* Status Area */
        #status { margin-top: 20px; text-align: center; }
        .download-link { display: inline-block; padding: 12px 20px; background: #10B981; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Header (XML UI) -->
    <div class="header">
        <h1>Home</h1>
        <button class="menu-btn" onclick="alert('Settings feature coming soon!')" title="Settings">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
    </div>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Input & Dynamic Paste/Clear Button (Kotlin Logic) -->
        <div class="input-wrapper">
            <input type="url" id="urlInput" placeholder="Paste link here..." autocomplete="off">
            <button class="action-btn" id="actionBtn" title="Paste">
                <!-- SVG Icon (Default is Paste) -->
                <svg id="actionIcon" viewBox="0 0 24 24"><path d="M19,2h-4.18C14.4,0.84,13.3,0,12,0C10.7,0,9.6,0.84,9.18,2H5C3.9,2,3,2.9,3,4v16c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V4 C21,2.9,20.1,2,19,2z M12,2c0.55,0,1,0.45,1,1s-0.45,1-1,1s-1-0.45-1-1S11.45,2,12,2z M19,20H5V4h2v3h10V4h2V20z"/></svg>
            </button>
        </div>

        <!-- Download Button -->
        <button class="download-btn" id="downloadBtn" onclick="processVideo()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download
        </button>

        <!-- Status / Result Display -->
        <div id="status"></div>

        <!-- Social Icons Grid (XML Logic) -->
        <div class="social-grid">
            <a class="social-item" href="https://www.instagram.com" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram"></a>
            <a class="social-item" href="https://www.facebook.com" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook"></a>
            <a class="social-item" href="https://web.whatsapp.com" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp"></a>
            <a class="social-item" href="https://www.tiktok.com" target="_blank"><img src="https://p16-va-tiktok.ibyteimg.com/obj/musically-maliva-obj/6968037326848131078" alt="TikTok"></a>
            <a class="social-item" href="https://mojapp.in/" target="_blank"><img src="https://play-lh.googleusercontent.com/FwT659jH9r-O4X1yUv89E1985i32O4v6E19qJ7uQn2mR-sV4B71HqO8R0g5uR2V4V8s=w240-h480-rw" alt="Moj"></a>
            <a class="social-item" href="https://twitter.com" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/X_logo_2023.svg" alt="Twitter/X"></a>
        </div>
    </div>

    <!-- JavaScript (Kotlin ke logic ka Web Version) -->
    <script>
        const urlInput = document.getElementById('urlInput');
        const actionBtn = document.getElementById('actionBtn');
        const actionIcon = document.getElementById('actionIcon');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');

        // SVG Paths for Paste and Clear icons
        const svgPaste = '<path d="M19,2h-4.18C14.4,0.84,13.3,0,12,0C10.7,0,9.6,0.84,9.18,2H5C3.9,2,3,2.9,3,4v16c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V4 C21,2.9,20.1,2,19,2z M12,2c0.55,0,1,0.45,1,1s-0.45,1-1,1s-1-0.45-1-1S11.45,2,12,2z M19,20H5V4h2v3h10V4h2V20z"/>';
        const svgClear = '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>';

        // 1. DYNAMIC PASTE & CLEAR LOGIC (TextWatcher equivalent)
        urlInput.addEventListener('input', () => {
            if (urlInput.value.length > 0) {
                actionIcon.innerHTML = svgClear;
                actionBtn.title = "Clear";
            } else {
                actionIcon.innerHTML = svgPaste;
                actionBtn.title = "Paste";
            }
        });

        // Button Click Handler for Paste/Clear
        actionBtn.onclick = async () => {
            if (urlInput.value.length > 0) {
                // Clear text
                urlInput.value = '';
                actionIcon.innerHTML = svgPaste;
                actionBtn.title = "Paste";
            } else {
                // Paste from clipboard (Web Clipboard API)
                try {
                    const text = await navigator.clipboard.readText();
                    urlInput.value = text;
                    actionIcon.innerHTML = svgClear;
                    actionBtn.title = "Clear";
                } catch (err) {
                    alert('Clipboard access denied by browser. Please paste manually.');
                }
            }
        };

        // 2. LINK MANAGER LOGIC (Cloudflare API Integration)
        async function processVideo() {
            const rawUrl = urlInput.value.trim();
            if (!rawUrl) {
                alert("Please paste a link first!");
                return;
            }

            statusDiv.innerHTML = '<span style="color: #666;">Processing link... Please wait...</span>';
            downloadBtn.disabled = true;

            const gatewayUrl = `https://fvd-gateway.mra-official-contact.workers.dev/?url=${encodeURIComponent(rawUrl)}`;

            try {
                const response = await fetch(gatewayUrl);
                const data = await response.json();

                if (data && data.download_link) {
                    urlInput.value = ''; // Success par input clear kar do
                    actionIcon.innerHTML = svgPaste; // Icon wapas Paste wala kar do
                    
                    statusDiv.innerHTML = `
                        <p style="color: #10B981; margin-bottom: 10px; font-weight: bold;">Video Extracted!</p>
                        <a href="${data.download_link}" target="_blank" class="download-link">Click here to Download MP4</a>
                    `;
                } else {
                    statusDiv.innerHTML = `<span style="color: red;">Error: Invalid link or server error.</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span style="color: red;">Network error. Please try again.</span>`;
            }
            
            downloadBtn.disabled = false;
        }
    </script>

</body>
</html>
