<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidnux - Universal Video Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 550px; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #38bdf8; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .input-group { width: 100%; margin-bottom: 20px; }
        input { width: 100%; padding: 14px 16px; background: #0f172a; border: 2px solid #334155; border-radius: 8px; color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #38bdf8; outline: none; }
        button { width: 100%; padding: 14px; background: #0284c7; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0369a1; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 15px; color: #e2e8f0; word-break: break-word; }
        .loader { display: none; margin: 15px auto; border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .download-box { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border: 1px solid #22c55e; }
        .download-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #22c55e; color: #fff; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .download-link:hover { background: #16a34a; }
        .error { color: #f43f5e !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vidnux Downloader</h1>
    <p class="subtitle">All-in-One Video Downloader Web</p>
    
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Paste video link (TikTok, Insta, YT, etc.)...">
    </div>
    
    <button id="btnProcess" onclick="fetchVideo()">Download Video</button>
    
    <div class="loader" id="loader"></div>
    <div id="status"></div>
</div>

<script>
    async function fetchVideo() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btnProcess');
        
        if (!urlInput) {
            alert("Bhai, pehle video link paste karo!");
            return;
        }

        // Setup UI State
        statusDiv.innerHTML = "";
        statusDiv.className = "";
        loader.style.display = "block";
        btn.disabled = true;

        // Tumhara Cloudflare gateway URL jo tumhare Android code mein tha
        const gatewayUrl = `https://fvd-gateway.mra-official-contact.workers.dev/?url=${encodeURIComponent(urlInput)}`;

        try {
            const response = await fetch(gatewayUrl);
            const data = await response.json();

            loader.style.display = "none";
            btn.disabled = false;

            // Response check jo tumhare app ke download_link logic par based hai
            if (data && data.download_link) {
                statusDiv.innerHTML = `
                    <div class="download-box">
                        <p style="color: #22c55e; font-weight: bold;">✓ Video Link Extracted!</p>
                        <a href="${data.download_link}" target="_blank" rel="noopener noreferrer" class="download-link">Save Video (MP4)</a>
                    </div>
                `;
            } else {
                statusDiv.className = "error";
                statusDiv.innerHTML = "Error: Video link nahi mil paya. Gateway ne galat response diya.";
            }
        } catch (error) {
            loader.style.display = "none";
            btn.disabled = false;
            statusDiv.className = "error";
            statusDiv.innerHTML = "Network Error: Server se connect nahi ho paya ya CORS issue hai!";
            console.error(error);
        }
    }
</script>

</body>
</html>
