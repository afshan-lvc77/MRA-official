<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRA Play Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --surface: #121212; --primary: #01875f; --text: #e1e1e1; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        /* Top Navigation */
        .navbar { padding: 15px 20px; background: var(--surface); display: flex; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }

        /* Hero Banner */
        .hero { margin: 15px; height: 160px; background: linear-gradient(45deg, #1a237e, #01875f); border-radius: 12px; display: flex; align-items: center; padding: 20px; box-sizing: border-box; }
        .hero-text h2 { margin: 0; font-size: 22px; }

        /* Sections */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px 10px; }
        .section-title { font-size: 18px; font-weight: 500; }
        .more-btn { color: var(--primary); font-size: 14px; font-weight: 500; cursor: pointer; }

        /* Horizontal App List */
        .app-list { display: flex; overflow-x: auto; padding: 10px 15px; gap: 18px; scrollbar-width: none; }
        .app-list::-webkit-scrollbar { display: none; }
        
        .app-item { min-width: 100px; max-width: 100px; text-decoration: none; color: inherit; }
        .app-icon-wrapper { width: 100px; height: 100px; background: #222; border-radius: 22px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .app-icon { width: 100%; height: 100%; object-fit: cover; }
        .app-name { margin-top: 8px; font-size: 13px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .app-info { font-size: 11px; color: #9aa0a6; margin-top: 2px; }

        /* Grid for Bottom Sections */
        .app-grid { padding: 0 15px; }
        .grid-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; text-decoration: none; color: inherit; }
        .grid-icon { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; background: #222; }
        .grid-details h4 { margin: 0; font-size: 15px; font-weight: 500; }
        .grid-details p { margin: 4px 0 0; font-size: 12px; color: #9aa0a6; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">MRA <span>Play</span></div>
    </nav>

    <div class="hero">
        <div class="hero-text">
            <h2>Hacking & Tools</h2>
            <p>Premium Android Projects by MRA</p>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">New & Updated</div>
        <div class="more-btn">See all</div>
    </div>
    <div class="app-list" id="newList">
        </div>

    <div class="section-header">
        <div class="section-title">Hacking Tools</div>
        <div class="more-btn">Explore</div>
    </div>
    <div class="app-grid" id="hackingGrid">
        </div>

    <script>
        const SUPABASE_URL = 'https://eteahrnwvtddxqopspuc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZWFocm53dnRkZHhxb3BzcHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ5MjMsImV4cCI6MjA5MTIzMDkyM30.shLfPxwnSLrJtnZ6-xsLnliep_sm9YX7tN9OTZc5DmY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadStore() {
            const { data: apps, error } = await _supabase
                .from('my_apps')
                .select('*')
                .order('id', { ascending: false });

            if (error) return console.error(error);

            const newList = document.getElementById('newList');
            const hackingGrid = document.getElementById('hackingGrid');

            // Loading Horizontal List (New Apps)
            newList.innerHTML = apps.map(app => `
                <a href="${app.download_url}" class="app-item">
                    <div class="app-icon-wrapper">
                        <img src="${app.icon_url || 'https://via.placeholder.com/100'}" class="app-icon">
                    </div>
                    <div class="app-name">${app.name}</div>
                    <div class="app-info">${app.size}</div>
                </a>
            `).join('');

            // Loading Vertical Grid (Hacking Category)
            const hackingApps = apps.filter(a => a.category === 'Hacking');
            hackingGrid.innerHTML = hackingApps.map(app => `
                <a href="${app.download_url}" class="grid-item">
                    <img src="${app.icon_url}" class="grid-icon">
                    <div class="grid-details">
                        <h4>${app.name}</h4>
                        <p>${app.category} • ${app.size}</p>
                    </div>
                </a>
            `).join('');
        }

        loadStore();
    </script>
</body>
</html>
