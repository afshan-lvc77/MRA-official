<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidnux - Home</title>
    
    <!-- CSS file 'css' folder ke andar se load hogi -->
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Home</h1>
        
        <!-- APK Download Button -->
        <a href="#" class="apk-btn" download>
            <!-- App ka Logo (vidnux.png) -->
            <img src="assets/vidnux.png" alt="Vidnux Logo" class="apk-logo">
            <!-- Text -->
            <span class="apk-text">APK Download</span>
            <!-- Download Symbol -->
            <svg class="apk-icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        </a>
    </div>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Input & Dynamic Paste/Clear Button -->
        <div class="input-wrapper">
            <input type="url" id="urlInput" placeholder="Paste link here..." autocomplete="off">
            <button class="action-btn" id="actionBtn" title="Paste">
                <svg id="actionIcon" viewBox="0 0 24 24"><path d="M19,2h-4.18C14.4,0.84,13.3,0,12,0C10.7,0,9.6,0.84,9.18,2H5C3.9,2,3,2.9,3,4v16c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V4 C21,2.9,20.1,2,19,2z M12,2c0.55,0,1,0.45,1,1s-0.45,1-1,1s-1-0.45-1-1S11.45,2,12,2z M19,20H5V4h2v3h10V4h2V20z"/></svg>
            </button>
        </div>

        <!-- Download Button -->
        <button class="download-btn" id="downloadBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download
        </button>

        <!-- Status / Result Display -->
        <div id="status"></div>

        <!-- Social Icons Grid -->
        <div class="social-grid">
            <a class="social-item" href="https://www.instagram.com" target="_blank"><img src="assets/inst.png" alt="Insta"></a>
            <a class="social-item" href="https://www.facebook.com" target="_blank"><img src="assets/fb.png" alt="FB"></a>
            <a class="social-item" href="https://web.whatsapp.com" target="_blank"><img src="assets/wp.png" alt="WA"></a>
            <a class="social-item" href="https://www.tiktok.com" target="_blank"><img src="assets/tk.png" alt="TikTok"></a>
            <a class="social-item" href="https://mojapp.in/" target="_blank"><img src="assets/mj.png" alt="Moj"></a>
            <a class="social-item" href="https://twitter.com" target="_blank"><img src="assets/tw.png" alt="X"></a>
        </div>
    </div>

    <!-- JS files 'js' folder se load hongi -->
    <script src="js/download.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
