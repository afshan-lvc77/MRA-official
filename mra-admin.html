<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRA Master Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --green: #00ff88; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-main { background: var(--green); color: black; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Tabs */
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .tab { padding: 10px; cursor: pointer; color: #888; }
        .tab.active { color: var(--green); border-bottom: 2px solid var(--green); }

        /* App Cards */
        .section { display: none; }
        .section.active { display: block; }
        .app-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; }
        .app-icon { width: 50px; height: 50px; border-radius: 10px; }
        .app-details { flex-grow: 1; }
        .actions { display: flex; gap: 10px; }
        
        .btn-approve { background: var(--green); color: black; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ff4444; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }

        /* Upload Modal (Popup) */
        #uploadModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; }
        .modal-content { background:#222; padding:30px; border-radius:15px; width:90%; max-width:400px; }
        input, select { width:100%; padding:10px; margin:10px 0; background:#333; border:1px solid #444; color:white; border-radius:5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <h1>MRA <span style="color:var(--green)">Console</span></h1>
            <div>
                <button class="btn-main" onclick="openUpload()">+ Upload New App</button>
                <button onclick="location.reload()" style="background:none; color:#888; border:none; cursor:pointer;">Refresh</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tabLive" onclick="switchTab('live')">Public Apps</div>
            <div class="tab" id="tabPending" onclick="switchTab('pending')">User Submissions</div>
        </div>

        <div id="liveSection" class="section active">
            <div id="liveList">Loading...</div>
        </div>

        <div id="pendingSection" class="section">
            <div id="pendingList">No new submissions.</div>
        </div>
    </div>

    <div id="uploadModal">
        <div class="modal-content">
            <h3>Upload New App (Direct Live)</h3>
            <input type="text" id="appName" placeholder="App Name">
            <input type="text" id="appDesc" placeholder="Description">
            <input type="text" id="appSize" placeholder="Size (ex: 5MB)">
            <select id="appCat">
                <option value="Tools">Tools</option>
                <option value="Hacking">Hacking</option>
            </select>
            <p style="font-size:12px; color:var(--green)">Note: File selection logic purana wala use karein</p>
            <button class="btn-main" onclick="saveNewApp()">Publish Now</button>
            <button onclick="closeUpload()" style="background:none; color:white; margin-top:10px; border:none; width:100%;">Cancel</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('URL', 'KEY');

        // Tab Switching
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            if(type === 'live') {
                document.getElementById('tabLive').classList.add('active');
                document.getElementById('liveSection').classList.add('active');
            } else {
                document.getElementById('tabPending').classList.add('active');
                document.getElementById('pendingSection').classList.add('active');
            }
        }

        function openUpload() { document.getElementById('uploadModal').style.display='flex'; }
        function closeUpload() { document.getElementById('uploadModal').style.display='none'; }

        async function fetchApps() {
            const { data: apps } = await _supabase.from('my_apps').select('*').order('id', {ascending: false});
            
            const liveList = document.getElementById('liveList');
            const pendingList = document.getElementById('pendingList');
            
            liveList.innerHTML = ""; pendingList.innerHTML = "";

            apps.forEach(app => {
                const card = `
                    <div class="app-card">
                        <img src="${app.icon_url}" class="app-icon">
                        <div class="app-details">
                            <strong>${app.name}</strong><br>
                            <small>Dev: ${app.developer_name || 'MRA'} | ${app.size}</small>
                        </div>
                        <div class="actions">
                            ${!app.is_approved ? `<button class="btn-approve" onclick="approveApp(${app.id})">Approve</button>` : ''}
                            <button class="btn-delete" onclick="deleteApp(${app.id})">Delete</button>
                        </div>
                    </div>
                `;
                if(app.is_approved) liveList.innerHTML += card;
                else pendingList.innerHTML += card;
            });
        }

        async function approveApp(id) {
            await _supabase.from('my_apps').update({ is_approved: true, status: 'live' }).eq('id', id);
            fetchApps();
        }

        async function deleteApp(id) {
            if(confirm("Bhai, delete karu?")) {
                await _supabase.from('my_apps').delete().eq('id', id);
                fetchApps();
            }
        }

        fetchApps();
    </script>
</body>
</html>
