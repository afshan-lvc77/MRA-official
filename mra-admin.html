<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRA Master Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --green: #00ff88; --dark: #0a0a0a; --card: #161616; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Login Screen */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--green); text-align: center; width: 90%; max-width: 350px; }
        
        /* Dashboard */
        .container { max-width: 800px; margin: auto; display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 15px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .tab { padding: 10px; cursor: pointer; color: #888; }
        .tab.active { color: var(--green); border-bottom: 2px solid var(--green); }
        
        .btn-green { background: var(--green); color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .app-card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .app-icon { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        /* Popup */
        #uploadModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--green)">MRA ADMIN LOGIN</h2>
            <input type="email" id="admEmail" placeholder="mohdsahidkhan911@gmail.com" value="mohdsahidkhan911@gmail.com">
            <input type="password" id="admPass" placeholder="Admin Password">
            <button class="btn-green" onclick="handleLogin()">Access Console</button>
        </div>
    </div>

    <div class="container" id="mainDash">
        <div class="header">
            <h1>MRA <span style="color:var(--green)">Console</span></h1>
            <button class="btn-green" style="width:auto" onclick="openModal()">+ Upload App</button>
        </div>

        <div class="tabs">
            <div class="tab active" id="tLive" onclick="switchTab('live')">Live Apps</div>
            <div class="tab" id="tPend" onclick="switchTab('pending')">Submissions</div>
        </div>

        <div id="appList">Loading apps...</div>
    </div>

    <div id="uploadModal">
        <div class="modal-box">
            <h3>Publish New APK</h3>
            <input type="text" id="appName" placeholder="App Name">
            <input type="file" id="iconFile" accept="image/*">
            <input type="file" id="apkFile" accept=".apk">
            <div id="upStatus" style="font-size:12px; color:var(--green); margin:5px 0;"></div>
            <button id="pubBtn" class="btn-green" onclick="uploadData()">Start Upload</button>
            <button onclick="closeModal()" style="background:none; color:#888; border:none; margin-top:10px; width:100%; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        // APNI DETAILS YAHAN DAALEIN
        const S_URL = 'https://eteahrnwvtddxqopspuc.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZWFocm53dnRkZHhxb3BzcHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ5MjMsImV4cCI6MjA5MTIzMDkyM30.shLfPxwnSLrJtnZ6-xsLnliep_sm9YX7tN9OTZc5DmY';
        const _supa = supabase.createClient(S_URL, S_KEY);

        let currentTab = 'live';

        // --- LOGIN LOGIC ---
        async function handleLogin() {
            const email = document.getElementById('admEmail').value;
            const pass = document.getElementById('admPass').value;

            if(email !== 'mohdsahidkhan911@gmail.com') {
                alert("Bhai, tu MRA nahi hai!"); return;
            }

            const { data, error } = await _supa.auth.signInWithPassword({ email, password: pass });
            if(error) alert("Error: " + error.message);
            else {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDash').style.display = 'block';
                fetchApps();
            }
        }

        // --- DASHBOARD LOGIC ---
        function switchTab(t) {
            currentTab = t;
            document.getElementById('tLive').classList.toggle('active', t==='live');
            document.getElementById('tPend').classList.toggle('active', t==='pending');
            fetchApps();
        }

        function openModal() { document.getElementById('uploadModal').style.display='flex'; }
        function closeModal() { document.getElementById('uploadModal').style.display='none'; }

        async function fetchApps() {
            const list = document.getElementById('appList');
            list.innerHTML = "Fetching...";
            
            const isApproved = (currentTab === 'live');
            const { data } = await _supa.from('my_apps').select('*').eq('is_approved', isApproved).order('id', {ascending:false});

            if(!data || data.length === 0) { list.innerHTML = "No apps found."; return; }

            list.innerHTML = data.map(app => `
                <div class="app-card">
                    <img src="${app.icon_url}" class="app-icon">
                    <div style="flex-grow:1">
                        <strong>${app.name}</strong><br>
                        <small style="color:#888">${app.size} | ${app.developer_name || 'MRA'}</small>
                    </div>
                    <button onclick="deleteApp(${app.id})" style="background:none; border:none; color:#ff4444; cursor:pointer;">Delete</button>
                </div>
            `).join('');
        }

        // --- UPLOAD LOGIC ---
        async function uploadData() {
            const name = document.getElementById('appName').value;
            const iconF = document.getElementById('iconFile').files[0];
            const apkF = document.getElementById('apkFile').files[0];
            if(!name || !iconF || !apkF) return alert("Pehle file select karo bhai!");

            const btn = document.getElementById('pubBtn');
            const status = document.getElementById('upStatus');
            btn.disabled = true;

            try {
                status.innerText = "Uploading Icon...";
                const iconPath = `icons/${Date.now()}_${iconF.name}`;
                await _supa.storage.from('app_files').upload(iconPath, iconF);
                const iUrl = _supa.storage.from('app_files').getPublicUrl(iconPath).data.publicUrl;

                status.innerText = "Uploading APK...";
                const apkPath = `apks/${Date.now()}_${apkF.name}`;
                await _supa.storage.from('app_files').upload(apkPath, apkF);
                const aUrl = _supa.storage.from('app_files').getPublicUrl(apkPath).data.publicUrl;

                status.innerText = "Finishing...";
                const fSize = (apkF.size / (1024*1024)).toFixed(2) + " MB";

                await _supa.from('my_apps').insert([{
                    name: name, icon_url: iUrl, download_url: aUrl, 
                    size: fSize, is_approved: true, developer_name: 'MRA Official'
                }]);

                alert("App Published!");
                location.reload();
            } catch(e) { alert(e.message); btn.disabled = false; }
        }

        async function deleteApp(id) {
            if(confirm("Delete karu?")) {
                await _supa.from('my_apps').delete().eq(id);
                fetchApps();
            }
        }
    </script>
</body>
    </html>
