<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRA Master Console Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --green: #00ff88; --dark: #0a0a0a; --card: #161616; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--green); text-align: center; width: 90%; max-width: 350px; }
        .container { max-width: 900px; margin: auto; display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 15px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .tab { padding: 10px; cursor: pointer; color: #888; }
        .tab.active { color: var(--green); border-bottom: 2px solid var(--green); }
        .btn-green { background: var(--green); color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #uploadModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); overflow-y: auto; padding: 20px 0; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 95%; max-width: 600px; margin: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        label { font-size: 12px; color: var(--green); display: block; margin-top: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:var(--green)">MRA ADMIN LOGIN</h2>
            <input type="email" id="admEmail" value="mohdsahidkhan911@gmail.com">
            <input type="password" id="admPass" placeholder="Admin Password">
            <button class="btn-green" style="width:100%" onclick="handleLogin()">Access Console</button>
        </div>
    </div>

    <div class="container" id="mainDash">
        <div class="header">
            <h1>MRA <span style="color:var(--green)">Console</span></h1>
            <button class="btn-green" onclick="openModal()">+ Publish New App</button>
        </div>
        <div class="tabs">
            <div class="tab active" id="tLive" onclick="switchTab('live')">Live Apps</div>
            <div class="tab" id="tPend" onclick="switchTab('pending')">User Submissions</div>
        </div>
        <div id="appList">Loading...</div>
    </div>

    <div id="uploadModal">
        <div class="modal-box">
            <h3 style="color:var(--green); margin-top:0;">Publish New APK</h3>
            
            <label>Basic Details</label>
            <input type="text" id="appName" placeholder="App Name (ex: ScreenBar Pro)">
            <textarea id="appDesc" placeholder="App ke bare mein thoda likhein (Description)..." rows="3"></textarea>
            
            <div class="grid-2">
                <div>
                    <label>Package Name</label>
                    <input type="text" id="pkgName" placeholder="com.mra.app">
                </div>
                <div>
                    <label>Version</label>
                    <input type="text" id="appVer" placeholder="1.0.1">
                </div>
            </div>

            <label>Search Keys (Comma separated)</label>
            <input type="text" id="searchKeys" placeholder="tools, downloader, mra">

            <label>Category</label>
            <select id="appCat">
                <optgroup label="Apps">
                    <option>Personalization</option><option>Photography</option>
                    <option>Productivity</option><option>Shopping</option>
                    <option>Social</option><option>Sports</option>
                    <option>Tools</option><option>Travel & Local</option>
                    <option>Video Players & Editors</option><option>Weather</option>
                </optgroup>
                <optgroup label="Games">
                    <option>Action</option><option>Adventure</option>
                    <option>Arcade</option><option>Board</option>
                    <option>Card</option><option>Casino</option>
                    <option>Casual</option><option>Educational</option>
                    <option>Music</option><option>Puzzle</option>
                    <option>Racing</option><option>Role Playing (RPG)</option>
                    <option>Simulation</option><option>Sports</option>
                    <option>Strategy</option><option>Trivia</option>
                    <option>Word</option>
                </optgroup>
            </select>

            <label>Files (Icon & APK)</label>
            <div class="grid-2">
                <div style="font-size:11px">Icon PNG:<input type="file" id="iconFile" accept="image/png"></div>
                <div style="font-size:11px">APK File:<input type="file" id="apkFile" accept=".apk"></div>
            </div>

            <label>Screenshots (Min: 2, Max: 7)</label>
            <input type="file" id="ssFiles" accept="image/*" multiple>

            <div id="upStatus" style="font-size:12px; color:var(--green); margin:10px 0; font-weight:bold;"></div>
            
            <button id="pubBtn" class="btn-green" style="width:100%; margin-top:10px;" onclick="uploadData()">Start Full Upload</button>
            <button onclick="closeModal()" style="background:none; color:#888; border:none; margin-top:15px; width:100%; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const S_URL = 'https://eteahrnwvtddxqopspuc.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZWFocm53dnRkZHhxb3BzcHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTQ5MjMsImV4cCI6MjA5MTIzMDkyM30.shLfPxwnSLrJtnZ6-xsLnliep_sm9YX7tN9OTZc5DmY';
        const _supa = supabase.createClient(S_URL, S_KEY);

        async function handleLogin() {
            const email = document.getElementById('admEmail').value;
            const pass = document.getElementById('admPass').value;
            if(email !== 'mohdsahidkhan911@gmail.com') return alert("Tu MRA nahi hai!");
            const { error } = await _supa.auth.signInWithPassword({ email, password: pass });
            if(error) alert(error.message);
            else { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainDash').style.display = 'block'; fetchApps(); }
        }

        function openModal() { document.getElementById('uploadModal').style.display='block'; }
        function closeModal() { document.getElementById('uploadModal').style.display='none'; }

        async function uploadData() {
            const btn = document.getElementById('pubBtn');
            const status = document.getElementById('upStatus');
            const ssInput = document.getElementById('ssFiles');
            
            if(ssInput.files.length < 2 || ssInput.files.length > 7) return alert("Bhai, minimum 2 aur maximum 7 screenshots chahiye!");

            btn.disabled = true;
            try {
                // 1. Upload Icon
                status.innerText = "Uploading Icon...";
                const iconF = document.getElementById('iconFile').files[0];
                const iconPath = `icons/${Date.now()}_icon.png`;
                await _supa.storage.from('apks').upload(iconPath, iconF);
                const iUrl = _supa.storage.from('apks').getPublicUrl(iconPath).data.publicUrl;

                // 2. Upload APK
                status.innerText = "Uploading APK...";
                const apkF = document.getElementById('apkFile').files[0];
                const apkPath = `apks/${Date.now()}_app.apk`;
                await _supa.storage.from('apks').upload(apkPath, apkF);
                const aUrl = _supa.storage.from('apks').getPublicUrl(apkPath).data.publicUrl;

                // 3. Upload Screenshots
                status.innerText = "Uploading Screenshots...";
                let ssUrls = [];
                for(let i=0; i < ssInput.files.length; i++) {
                    const path = `screenshots/${Date.now()}_ss${i}.jpg`;
                    await _supa.storage.from('apks').upload(path, ssInput.files[i]);
                    ssUrls.push(_supa.storage.from('apks').getPublicUrl(path).data.publicUrl);
                }

                // 4. Save to Database
                status.innerText = "Saving to Database...";
                const fSize = (apkF.size / (1024*1024)).toFixed(2) + " MB";
                
                await _supa.from('my_apps').insert([{
                    name: document.getElementById('appName').value,
                    description: document.getElementById('appDesc').value,
                    pkg_name: document.getElementById('pkgName').value,
                    version: document.getElementById('appVer').value,
                    category: document.getElementById('appCat').value,
                    search_keys: document.getElementById('searchKeys').value,
                    icon_url: iUrl,
                    download_url: aUrl,
                    screenshots: ssUrls, // Storing as JSON array
                    size: fSize,
                    is_approved: true,
                    developer_name: 'MRA Official'
                }]);

                alert("Mubarak ho! App poori details ke sath upload ho gaya.");
                location.reload();
            } catch(e) { alert(e.message); btn.disabled = false; }
        }

        // Rest of fetch/delete logic same as before...
        function switchTab(t) { /* same */ }
        async function fetchApps() { /* same */ }
    </script>
</body>
</html>
